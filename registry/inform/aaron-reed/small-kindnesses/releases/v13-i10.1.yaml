schema-version: 2
maintainer: Aaron Reed
channel: stable
compatibility:
  inform:
    constraint: '>=10.1'
source:
  url: https://github.com/i7/extensions/blob/10.1/Aaron%20Reed/Small%20Kindnesses-v13.i7x
