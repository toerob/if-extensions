schema-version: 1
maintainer: Jon Ingold
channel: stable
compatibility:
  inform:
    constraint: '>=9.3 <10'
source:
  url: https://github.com/i7/extensions/blob/9.3/Jon%20Ingold/Disambiguation%20Control.i7x
  format: i7x
