schema-version: 1
maintainer: Emily Short
channel: stable
compatibility:
  inform:
    constraint: '>=9.3 <10'
source:
  url: https://github.com/i7/extensions/blob/9.3/Emily%20Short/Modified%20Exit.i7x
  format: i7x
build:
  private:
  - type: extension
    path: Modified Exit.i7x
description: Changes the handling of the EXIT action, allowing commands such as EXIT
  PLATFORM and GET OUT OF CHAIR, making characters leave enterable objects before
  traveling, and altering the default interpretation of >OUT when the player is neither
  inside an object nor in a room with an outside exit. Updated for adaptive text.
