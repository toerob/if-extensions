schema-version: 1
maintainer: Emily Short
channel: stable
compatibility:
  inform:
    constraint: '>=10.1'
source:
  url: https://github.com/i7/extensions/blob/10.1/Emily%20Short/Modern%20Conveniences-v5.i7x
  format: i7x
build:
  private:
  - type: extension
    path: Modern Conveniences-v5.i7x
description: Modern Conveniences creates kitchen and bathroom kinds of room, which
  will automatically be furnished with a set of plausible appliances. (This was originally
  an example in the manual of how to create extensions, and an annotated version may
  still be found there.) Version 3 adds compatibility with Measured Liquid, modeling
  flowing water from taps.
