schema-version: 2
maintainer: Emily Short
channel: stable
compatibility:
  inform:
    constraint: '>=9.3 <10'
source:
  url: https://github.com/i7/extensions/blob/9.3/Emily%20Short/Recorded%20Endings.i7x
  format: i7x
build:
  private:
  - type: extension
    path: Recorded Endings.i7x
description: Records the endings the player encounters in multiple play-throughs to
  an external file; then adds an ENDINGS option to the final question to allow the
  player to review which endings he has seen so far.
