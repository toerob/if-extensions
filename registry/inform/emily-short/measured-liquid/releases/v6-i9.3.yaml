schema-version: 2
maintainer: Emily Short
channel: stable
compatibility:
  inform:
    constraint: '>=9.3 <10'
source:
  url: https://github.com/i7/extensions/blob/9.3/Emily%20Short/Measured%20Liquid.i7x
  format: i7x
build:
  private:
  - type: extension
    path: Measured Liquid.i7x
description: Measured Liquid provides a concept of volume, together with the ability
  to fill containers, pour measured amounts of liquid, and drink from containers.
  It handles mixtures as well, if desired. It is compatible with, but does not require,
  the Metric Units extension by Graham Nelson.
