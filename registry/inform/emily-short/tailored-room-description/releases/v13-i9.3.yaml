schema-version: 1
maintainer: Emily Short
channel: stable
compatibility:
  inform:
    constraint: '>=9.3 <10'
source:
  url: https://github.com/i7/extensions/blob/9.3/Emily%20Short/Tailored%20Room%20Description.i7x
  format: i7x
build:
  private:
  - type: extension
    path: Tailored Room Description.i7x
description: An extension to go with Room Description Control, providing a different
  style of room description than the default. Parenthetical remarks such as (open)
  and (in which are...) are omitted in favor of full English sentences. Removes the
  requirement for Text Variations.
