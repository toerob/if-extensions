schema-version: 1
maintainer: Nathanael Nerode
channel: stable
compatibility:
  inform:
    constraint: '>=10.1'
source:
  url: https://github.com/i7/extensions/blob/10.1/Nathanael%20Nerode/Compliant%20Characters-v5.i7x
  format: i7x
build:
  private:
  - type: extension
    path: Compliant Characters-v5.i7x
description: Report parsing errors to the player when ordering other characters to
  do things.  Inform 7 normally redirects these errors to 'answer <topic>' so that
  the character can respond to arbitrary statements.  But in an story with compliant
  characters who the player orders around routinely, that is frustrating to a player
  who has made a typo; this helps out the player.  Requires version 5 of Neutral Standard
  Responses.  Tested with Inform 10.1.0.
