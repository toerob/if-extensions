schema-version: 1
id: title-case-for-headings
name: Title Case For Headings
author: Nathanael Nerode
description: Applies title case to room names printed as a heading or in the status
  line.  Creates the printing a heading activity for further customization.  Tested
  with Inform 10.1.0.  Requires Undo Output Control by Nathanael Nerode to handle
  the case of room name printing after UNDO.
