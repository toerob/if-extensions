schema-version: 2
maintainer: Nathanael Nerode
channel: stable
compatibility:
  inform:
    constraint: '>=9.3 <10'
source:
  url: https://github.com/i7/extensions/blob/9.3/Nathanael%20Nerode/Title%20Case%20for%20Headings.i7x
  format: i7x
build:
  private:
  - type: extension
    path: Title Case for Headings.i7x
description: Applies title case to room names printed as a heading or in the status
  line.  Creates the printing a heading activity for further customization.  Tested
  with Inform 6M62.  Requires Undo Output Control by Erik Temple or by Nathanael Nerode
  to handle the case of room name printing after UNDO.
