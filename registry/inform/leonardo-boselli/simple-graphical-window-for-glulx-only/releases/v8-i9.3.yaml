schema-version: 2
maintainer: Leonardo Boselli
channel: stable
compatibility:
  inform:
    constraint: '>=9.3 <10'
source:
  url: https://github.com/i7/extensions/blob/9.3/Leonardo%20Boselli/Simple%20Graphical%20Window.i7x
  format: i7x
build:
  private:
  - type: extension
