schema-version: 1
maintainer: Mikael Segercrantz
channel: stable
compatibility:
  inform:
    constraint: '>=11.0'
source:
  url: https://github.com/i7/extensions/tree/11.0/Mikael%20Segercrantz/Trinity%20Inventory-v5_1_2.i7xd
  format: i7xd
build:
  private:
  - type: extension
    path: Trinity Inventory-v5_1_2.i7xd
description: Provides a framework for listing inventories in natural sentences, akin
  to Infocom's game Trinity. Separates carried and worn objects, followed by objects
  that contains other objects. What's listed in the third section is customizable
  via a rulebook. Objects can be marked as not listed when carried or worn as well
  as marked as having their contents listed in the inventory when they're empty. This
  extension is based upon the extension Written Inventory by Jon Ingold.
