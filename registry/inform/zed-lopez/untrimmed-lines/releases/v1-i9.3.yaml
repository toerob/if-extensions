schema-version: 2
maintainer: Zed Lopez
channel: stable
compatibility:
  inform:
    constraint: '>=9.3 <10'
source:
  url: https://github.com/i7/extensions/blob/9.3/Zed%20Lopez/Untrimmed%20Lines.i7x
  format: i7x
build:
  private:
  - type: extension
    path: Untrimmed Lines.i7x
description: 'I7''s line number phrase returns lines with left and right whitespace

  trimmed; other than using regexps, there isn''t a built-in means to

  access the raw untrimmed line. This adds an ``untrimmed line number``

  phrase.'
