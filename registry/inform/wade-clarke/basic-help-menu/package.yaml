schema-version: 1
id: basic-help-menu
name: Basic Help Menu
author: Wade Clarke
description: Adds a HELP command to your Glulx or Z-Code project for Inform 6M62 or
  later which brings up a menu giving some standard instructions about IF. This is
  a tech and content update of Emily Short's Basic Help Menu extension made for compatibility
  with Wade Clarke's Menus. Requires Menus by Wade Clarke (version 5 or greater) to
  run.
