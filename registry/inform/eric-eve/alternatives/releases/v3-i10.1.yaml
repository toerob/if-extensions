schema-version: 2
maintainer: Eric Eve
channel: stable
compatibility:
  inform:
    constraint: '>=10.1'
source:
  url: https://github.com/i7/extensions/blob/10.1/Eric%20Eve/Alternatives-v3.i7x
  format: i7x
build:
  private:
  - type: extension
