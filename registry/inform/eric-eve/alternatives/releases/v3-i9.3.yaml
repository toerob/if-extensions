schema-version: 1
maintainer: Eric Eve
channel: stable
compatibility:
  inform:
    constraint: '>=9.3 <10'
source:
  url: https://github.com/i7/extensions/blob/9.3/Eric%20Eve/Alternatives.i7x
  format: i7x
build:
  private:
  - type: extension
    path: Alternatives.i7x
description: Allows checking the presence of an object or value in a set of objects
  or values with new either/or and neither/nor phrases. e.g., 'If the noun is either
  the carrot or the potato:', or 'Instead of eating something when the noun is neither
  the cake nor the pudding:'
