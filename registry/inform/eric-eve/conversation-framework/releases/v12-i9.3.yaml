schema-version: 1
maintainer: Eric Eve
channel: stable
compatibility:
  inform:
    constraint: '>=9.3 <10'
source:
  url: https://github.com/i7/extensions/blob/9.3/Eric%20Eve/Conversation%20Framework.i7x
