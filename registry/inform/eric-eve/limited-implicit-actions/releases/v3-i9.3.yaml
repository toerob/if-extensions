schema-version: 2
maintainer: Eric Eve
channel: stable
compatibility:
  inform:
    constraint: '>=9.3 <10'
source:
  url: https://github.com/i7/extensions/blob/9.3/Eric%20Eve/Limited%20Implicit%20Actions.i7x
  format: i7x
build:
  private:
  - type: extension
