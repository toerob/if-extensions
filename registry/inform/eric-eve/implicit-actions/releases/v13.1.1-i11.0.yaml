schema-version: 2
maintainer: Eric Eve
channel: stable
compatibility:
  inform:
    constraint: '>=11.0'
source:
  url: https://github.com/i7/extensions/tree/11.0/Eric%20Eve/Implicit%20Actions-v13_1_1.i7xd
  format: i7xd
build:
  private:
  - type: extension
    path: Implicit Actions-v13_1_1.i7xd
description: Provides implicit taking, opening, closing, locking and unlocking actions
  for a variety of cases where this makes for smoother game play. The extension also
  defines phrases which make it easy to define additional implicit actions if desired.
  Version 11 can be used with Locksmith by Emily Short (although Implicit Actions
  covers most of what Locksmith does, and in most cases it will be better to use Implicit
  Actions without Locksmith). Requires  Version 8.1 (or above) of Text Capture by
  Eric Eve.
