schema-version: 1
id: conversation-package
name: Conversation Package
author: Eric Eve
description: This extension includes both Conversation Nodes and Conversation Suggestions,
  and makes the suggestions aware of conversation nodes. It therefore includes the
  complete conversational system in one package. It also requires Conversation Responses,
  Conversational Defaults, Conversation Framework and Epistemology. The documentation
  for this extension give some guidance on how these other extensions can be mixed
  and matched.
