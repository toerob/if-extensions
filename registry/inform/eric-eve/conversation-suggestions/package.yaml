schema-version: 1
id: conversation-suggestions
name: Conversation Suggestions
author: Eric Eve
description: Provides a means of suggesting topics of conversation to the player,
  either in response to a TOPICS command or when NPCs are greeted. This extension
  requires Conversation Framework. Version 3 makes use of Complex Listing by Emily
  Short if it's included in the same game rather than indexed text to generate a list
  of suggestions.
