schema-version: 2
maintainer: Daniel Gaskell
channel: stable
compatibility:
  inform:
    constraint: '>=9.3 <10'
source:
  url: https://github.com/i7/extensions/blob/9.3/Daniel%20Gaskell/Volumetric%20Limiter.i7x
  format: i7x
build:
  private:
  - type: extension
    path: Volumetric Limiter.i7x
description: Containers and actor that limit their contents by volume. Modeled after
  Bulk Limiter by Eric Eve, but understands length, width, and height as well as total
  size.
