schema-version: 1
maintainer: Ron Newcomb
channel: stable
compatibility:
  inform:
    constraint: '>=9.3 <10'
source:
  url: https://github.com/i7/extensions/blob/9.3/Ron%20Newcomb/Phrases%20for%20Tables%20with%20Topics.i7x
  format: i7x
build:
