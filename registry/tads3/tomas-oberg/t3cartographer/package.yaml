schema-version: 1
id: t3cartographer
name: t3cartographer
author: Tomas Öberg
description: The Tads3 Cartographer library is tool that generates a map from your
  Tads3 source code that can be used either as an aid when developing your game or
  as an in-game map for the player. It supports various output formats. Depending
  on your solution and framework it can be a map in svg, html, dot-graphics or plain
  old ascii.
